version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
      LLM_BACKEND: ollama
      OLLAMA_URL: http://ollama:11434
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../dataset:/app/dataset:ro
      - ../data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "1G"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
    networks:
      - epip-network

  neo4j:
    image: neo4j:5-community
    env_file:
      - .env.prod
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*,gds.*'
      NEO4J_dbms_security_procedures_allowlist: 'apoc.*,gds.*'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - epip-network

  redis:
    image: redis:7-alpine
    env_file:
      - .env.prod
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "512M"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - epip-network

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  epip-network:
    driver: bridge
